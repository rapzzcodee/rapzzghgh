<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border: 1px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
            border-radius: 8px;
            max-width: 90%;
        }

        .glitch {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        .typewriter {
            overflow: hidden;
            border-right: .15em solid #00ff41;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: .15em;
            animation: 
                typing 3.5s steps(40, end),
                blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00ff41; }
        }

        .system-info {
            font-size: 0.8rem;
            margin-top: 1.5rem;
            color: #008f11;
            text-align: left;
        }

        .btn-alert {
            margin-top: 2rem;
            padding: 0.5rem 1.5rem;
            border: 1px solid #00ff41;
            background: transparent;
            color: #00ff41;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-alert:hover {
            background: #00ff41;
            color: #000;
        }
    </style>

<body>

    <canvas id="matrix"></canvas>

    <div class="content">
        <h1 class="glitch mb-4">YOU WEB HACK BY RAPZZ 🙀</h1>

        <div class="system-info">
            <p>> [STATUS] System Compromised</p>
            <p>> [USER] RAPZZ Admin Access Granted</p>
            <p>> [IP] <span id="user-ip">127.0.0.1 (Local)</span></p>
            <p>> [DATA] Encryption successful...</p>
        </div>

        <button class="btn-alert" onclick="showPopup()">SAY HELLO TO RAPZZ</button>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[100]">
        <div class="bg-black border border-[#00ff41] p-8 max-w-sm text-center">

            <p class="mb-6">Hy mbut kamu aneh ya webnya kenapah?</p>
            <button onclick="closePopup()" class="border border-[#00ff41] px-4 py-2 hover:bg-[#00ff41] hover:text-black">CLOSE</button>
        </div>
    </div>

    <script>
        // Matrix Background Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // UI Logic
        function showPopup() {
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('custom-modal').style.display = 'none';
        }

        // Fake IP Fetching (simulated)
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('user-ip').innerText = data.ip;
            })
            .catch(() => {
                document.getElementById('user-ip').innerText = "Encrypted-Node-01";
            });
    </script>
</body>
</html>
